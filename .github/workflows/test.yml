name: test

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  unittest:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
